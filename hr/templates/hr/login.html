{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DBRecruitAI</title>
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="light-bg">
    <div class="bg-container dim"></div>

    <div class="login-screen">
        <div class="login-logo-container">
            <a href="{% url "home" %}"><img src="{% static "images/logo.png" %}" alt="DBRecruitAI Logo"></a>
        </div>
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back!</h1>
                <p>Please sign in to your HR account</p>
            </div>
            {% if messages %}
                {% for messages in messages %}
                    <p class="error-message">{{ message }} </p>
                {% endfor %}
            {% endif %}
            <form class="login-form" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address or Username</label>
                    <input type="text" name="username" placeholder="Enter your Email or Username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="form-actions text-center">
                    <button type="submit" class="btn btn-primary btn-login">Log In</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static "js/main.js" %}"></script>
</body>
</html>
